
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNIted</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main>
    <section class="hero">
      <div class="hero-inner">
        <p class="eyebrow">UNIted</p>

        <h1>
          もっと愛おしく、<br />
          もっと人間らしく。
        </h1>

        <p class="lead">
          UNItedは、言葉とデザインを通じて、
          個と個をつなぎ、感情や価値をかたちにする共創の場です。
        </p>

        <div class="three-cs">
          <div class="card">
            <span>01</span>
            <h2>Connect</h2>
            <p>個と個をつなぎ、新しい関係性や物語を生み出します。</p>
          </div>

          <div class="card">
            <span>02</span>
            <h2>Create</h2>
            <p>言葉とビジュアルを通じて、まだ名前のない感情や価値をかたちにします。</p>
          </div>

          <div class="card">
            <span>03</span>
            <h2>Cultivate</h2>
            <p>愛や感情、衝動を起点に、関係性や表現を育てていきます。</p>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
